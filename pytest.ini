[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=term-missing

[coverage:run]
omit =
    .venv/*
    tests/*
    migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.